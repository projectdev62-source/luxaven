<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Luxaven — Véhicule</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --red: #c0392b;
  --red-dim: rgba(192,57,43,0.12);
  --red-glow: rgba(192,57,43,0.35);
  --bg: #080808;
  --surface: #111111;
  --surface2: #161616;
  --border: #1f1f1f;
  --text: #e8e8e8;
  --muted: #666;
  --subtle: #333;
}
html, body {
  background: #080808 !important;
  color: #e8e8e8 !important;
}

html { scroll-behavior: smooth; }
body {
  background: #080808 !important;
  color: #e8e8e8 !important;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
  width: 100%;
}

/* ─── TOPBAR ─── */
.topbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 40px;
  height: 64px;
  background: rgba(8,8,8,0.92);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}
.topbar-left { display:flex; align-items:center; gap:20px; }
.back-btn {
  display: flex; align-items: center; gap: 8px;
  background: none; border: 1px solid var(--subtle);
  color: var(--muted); padding: 7px 16px;
  border-radius: 6px; cursor: pointer;
  font-size: 13px; font-family: inherit;
  transition: all .2s;
  letter-spacing: .3px;
}
.back-btn:hover { color: var(--text); border-color: var(--muted); }
.back-arrow { font-size: 16px; line-height: 1; }
.logo { height: 42px; width: auto; object-fit: contain; }
.topbar-title {
  font-family: 'Outfit', sans-serif;
  font-size: 13px; font-weight: 500;
  color: var(--muted); letter-spacing: .4px;
}
.topbar-title strong { color: var(--text); font-weight: 600; }

/* ─── LAYOUT ─── */
.layout {
  display: grid;
  grid-template-columns: 1fr 420px;
  min-height: calc(100vh - 64px);
  align-items: start;
  max-width: 100%;
  overflow-x: hidden;
}

/* ─── LEFT PANEL ─── */
.left { padding: 36px 40px 60px; }

/* ─── CAROUSEL ─── */
.carousel {
  position: relative;
  border-radius: 14px;
  overflow: hidden;
  margin-bottom: 32px;
  background: #0d0d0d;
  /* Red glow effect */
  box-shadow:
    0 0 60px rgba(192,57,43,0.18),
    0 0 120px rgba(192,57,43,0.08),
    0 30px 60px rgba(0,0,0,0.6);
}
.carousel::before {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 50%;
  background: linear-gradient(to top, rgba(192,57,43,0.08) 0%, transparent 100%);
  z-index: 1;
  pointer-events: none;
}
.carousel-track {
  display: flex;
  transition: transform .5s cubic-bezier(.4,0,.2,1);
}
.carousel-slide {
  min-width: 100%;
  position: relative;
}
.carousel-slide img {
  width: 100%;
  height: 400px;
  object-fit: cover;
  display: block;
  filter: brightness(.92);
  transition: filter .3s;
}
.carousel-slide img:hover { filter: brightness(1); }

/* Nav arrows */
.c-prev, .c-next {
  position: absolute; top: 50%; transform: translateY(-50%);
  z-index: 10;
  background: rgba(8,8,8,0.7);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.08);
  color: #fff;
  width: 42px; height: 42px;
  border-radius: 50%;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  transition: all .2s;
}
.c-prev { left: 16px; }
.c-next { right: 16px; }
.c-prev:hover, .c-next:hover {
  background: var(--red);
  border-color: var(--red);
  transform: translateY(-50%) scale(1.08);
}

/* Dots */
.c-dots {
  position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 6px; z-index: 10;
}
.c-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(255,255,255,0.25);
  cursor: pointer; border: none;
  transition: all .25s;
}
.c-dot.active {
  background: var(--red);
  width: 22px; border-radius: 3px;
  box-shadow: 0 0 8px var(--red-glow);
}

/* Thumbnail strip */
.thumb-strip {
  display: flex; gap: 8px; margin-bottom: 30px;
}
.thumb {
  flex: 1; border-radius: 8px; overflow: hidden;
  cursor: pointer; border: 2px solid transparent;
  transition: all .2s; opacity: .55;
}
.thumb.active { border-color: var(--red); opacity: 1; box-shadow: 0 0 12px var(--red-glow); }
.thumb img { width: 100%; height: 64px; object-fit: cover; display: block; }

/* ─── CAR INFO ─── */
.car-header { margin-bottom: 20px; }
.car-badge {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: 'Outfit', sans-serif;
  font-size: 10px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--red); margin-bottom: 10px;
}
.car-badge::before {
  content: ''; display: block;
  width: 20px; height: 1px; background: var(--red);
}
.car-name {
  font-family: 'Outfit', sans-serif;
  font-size: 30px; font-weight: 800;
  letter-spacing: -.5px; color: #fff;
  line-height: 1.1; margin-bottom: 6px;
}
.car-sub {
  font-size: 13px; color: var(--muted);
  letter-spacing: .3px; margin-bottom: 10px;
}
.car-rating {
  display: flex; align-items: center; gap: 8px;
}
.stars { color: #f0c040; font-size: 13px; letter-spacing: 1px; }
.rating-num { font-size: 13px; font-weight: 600; color: var(--text); }
.rating-count { font-size: 12px; color: var(--muted); }

/* ─── SPECS ─── */
.specs {
  display: grid; grid-template-columns: repeat(4,1fr); gap: 10px;
  margin-bottom: 28px;
}
.spec {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px; padding: 16px 12px;
  text-align: center;
  transition: border-color .2s, transform .2s;
}
.spec:hover { border-color: var(--subtle); transform: translateY(-2px); }
.spec-label {
  font-size: 10px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 1px;
  color: var(--muted); margin-bottom: 6px;
}
.spec-val {
  font-family: 'Outfit', sans-serif;
  font-size: 14px; font-weight: 700; color: var(--text);
}

/* ─── SECTION LABEL ─── */
.section-label {
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--muted); margin-bottom: 12px;
  display: flex; align-items: center; gap: 10px;
}
.section-label::after {
  content: ''; flex: 1;
  height: 1px; background: var(--border);
}

/* ─── FEATURES ─── */
.feat-list { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 32px; }
.feat {
  padding: 5px 13px; border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--surface);
  font-size: 12px; font-weight: 500;
  color: #bbb; letter-spacing: .2px;
  transition: all .2s;
}
.feat:hover { border-color: var(--red); color: var(--red); }

/* ─── REVIEWS ─── */
.review-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.review {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px; padding: 16px;
  transition: border-color .2s;
}
.review:hover { border-color: var(--subtle); }
.rev-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.rev-av {
  width: 34px; height: 34px; border-radius: 50%;
  background: var(--red-dim); border: 1px solid var(--red);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Outfit', sans-serif;
  font-weight: 700; font-size: 13px; color: var(--red);
  flex-shrink: 0;
}
.rev-name { font-size: 13px; font-weight: 600; color: var(--text); }
.rev-stars { font-size: 11px; color: #f0c040; letter-spacing: 1px; }
.rev-text { font-size: 13px; color: var(--muted); line-height: 1.65; }

/* Add review */
.add-review {
  border-top: 1px solid var(--border);
  padding-top: 20px; margin-top: 4px;
}
.add-review .section-label { margin-bottom: 14px; }
.rev-input {
  width: 100%; background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text); padding: 10px 14px;
  border-radius: 8px; font-size: 13px;
  font-family: inherit; margin-bottom: 8px; outline: none;
  transition: border-color .2s;
}
.rev-input:focus { border-color: var(--red); }
textarea.rev-input { height: 80px; resize: none; }
.rev-submit {
  background: transparent; border: 1px solid var(--red);
  color: var(--red); padding: 9px 22px;
  border-radius: 6px; cursor: pointer;
  font-size: 13px; font-weight: 600;
  font-family: inherit; letter-spacing: .3px;
  transition: all .2s;
}
.rev-submit:hover { background: var(--red); color: #fff; }

/* ─── RIGHT PANEL ─── */
.right {
  background: var(--surface);
  border-left: 1px solid var(--border);
  padding: 32px 28px;
  position: sticky; top: 64px;
  height: calc(100vh - 64px);
  overflow-y: auto;
}

.price-block { margin-bottom: 20px; }
.price-main {
  font-family: 'Outfit', sans-serif;
  font-size: 34px; font-weight: 800;
  color: var(--red); letter-spacing: -1px;
  line-height: 1;
}
.price-unit { font-size: 12px; color: var(--muted); margin-top: 3px; letter-spacing: .3px; }

.avail {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 13px; border-radius: 5px;
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .8px;
  margin-bottom: 26px;
}
.avail::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
}
.avail.ok { background: rgba(39,174,96,.1); color: #27ae60; border:1px solid rgba(39,174,96,.25); }
.avail.ok::before { background: #27ae60; box-shadow: 0 0 6px #27ae60; }
.avail.no { background: rgba(192,57,43,.1); color: var(--red); border:1px solid rgba(192,57,43,.25); }
.avail.no::before { background: var(--red); }

/* Divider */
.r-divider { height: 1px; background: var(--border); margin: 0 0 22px; }

.field-label {
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1px;
  color: var(--muted); margin-bottom: 5px; display: block;
}
.field-input {
  width: 100%; background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text); padding: 10px 13px;
  border-radius: 8px; font-size: 13px;
  font-family: inherit; outline: none; margin-bottom: 14px;
  transition: border-color .2s;
}
.field-input:focus { border-color: var(--red); }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.field-row > div { display: flex; flex-direction: column; }

.info-box {
  background: rgba(192,57,43,0.06);
  border: 1px solid rgba(192,57,43,0.2);
  border-radius: 8px; padding: 12px 14px;
  font-size: 12px; color: #c07070;
  margin-bottom: 20px; line-height: 1.6;
}

/* Summary */
.summary { margin-bottom: 20px; }
.sum-row {
  display: flex; justify-content: space-between;
  font-size: 13px; padding: 6px 0;
  border-bottom: 1px solid var(--border);
  color: var(--muted);
}
.sum-row span:last-child { color: var(--text); font-weight: 500; }
.sum-row:last-child {
  border: none; padding-top: 12px; margin-top: 4px;
  font-family: 'Outfit', sans-serif;
  font-weight: 700; font-size: 15px;
  color: var(--text);
}
.sum-row:last-child span:last-child { color: var(--red); }

.confirm-btn {
  width: 100%;
  background: var(--red); color: #fff;
  border: none; padding: 15px;
  border-radius: 10px; font-size: 14px; font-weight: 700;
  font-family: 'Outfit', sans-serif;
  cursor: pointer; letter-spacing: .5px;
  transition: all .2s;
  box-shadow: 0 4px 20px rgba(192,57,43,0.3);
}
.confirm-btn:hover {
  background: #a93226;
  box-shadow: 0 6px 28px rgba(192,57,43,0.45);
  transform: translateY(-1px);
}
.confirm-btn:disabled {
  background: var(--surface2); color: var(--subtle);
  cursor: not-allowed; box-shadow: none; transform: none;
}

/* ─── RESPONSIVE ─── */
@media (max-width: 960px) {
  .layout { grid-template-columns: 1fr; width: 100%; overflow-x: hidden; }
  * { max-width: 100%; }
  .right { position: static; height: auto; border-left: none; border-top: 1px solid var(--border); background: #111111; }
  .specs { grid-template-columns: repeat(2,1fr); }
  .left { padding: 24px 20px 40px; background: #080808; }
  .topbar { padding: 0 20px; }
  .carousel-slide img { height: 240px; }
  .thumb img { height: 50px; }
  .car-name { font-size: 22px; }
  .price-main { font-size: 26px; }
  body { background: #080808 !important; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <button class="back-btn" onclick="history.back()">
      <span class="back-arrow">&#8592;</span> Retour
    </button>
    <img src="1782738630390_image.png" class="logo" alt="Luxaven" onerror="this.style.display='none'">
  </div>
  <div class="topbar-title">Flotte <strong id="navCarName"></strong></div>
</div>

<div class="layout">
  <!-- LEFT -->
  <div class="left">

    <!-- Carousel -->
    <div class="carousel" id="carousel">
      <div class="carousel-track" id="track"></div>
      <button class="c-prev" onclick="slide(-1)">&#8249;</button>
      <button class="c-next" onclick="slide(1)">&#8250;</button>
      <div class="c-dots" id="dots"></div>
    </div>

    <!-- Thumbnails -->
    <div class="thumb-strip" id="thumbs"></div>

    <!-- Car header -->
    <div class="car-header">
      <div class="car-badge" id="carBadge"></div>
      <div class="car-name" id="carName"></div>
      <div class="car-sub" id="carSub"></div>
      <div class="car-rating" id="carRating"></div>
    </div>

    <!-- Specs -->
    <div class="specs" id="specs"></div>

    <!-- Features -->
    <div class="section-label">Équipements inclus</div>
    <div class="feat-list" id="feats"></div>

    <!-- Reviews -->
    <div class="section-label">Avis clients</div>
    <div class="review-list" id="reviews"></div>

    <!-- Add review -->
    <div class="add-review">
      <div class="section-label">Laisser un avis</div>
      <input class="rev-input" id="revName" type="text" placeholder="Votre prénom">
      <textarea class="rev-input" id="revText" placeholder="Votre expérience avec ce véhicule..."></textarea>
      <button class="rev-submit" onclick="addReview()">Publier l'avis</button>
    </div>

  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="price-block">
      <div class="price-main" id="rPrice"></div>
      <div class="price-unit">par jour · toutes taxes incluses</div>
    </div>
    <div class="avail" id="rAvail"></div>

    <div class="r-divider"></div>

    <label class="field-label">Date de départ</label>
    <input type="date" class="field-input" id="dateStart" onchange="calcTotal()">

    <label class="field-label">Date de retour</label>
    <input type="date" class="field-input" id="dateEnd" onchange="calcTotal()">

    <div class="field-row">
      <div>
        <label class="field-label">Nom complet</label>
        <input type="text" class="field-input" placeholder="Votre nom">
      </div>
      <div>
        <label class="field-label">Téléphone / WhatsApp</label>
        <input type="text" class="field-input" placeholder="+212 6XX XXX XXX">
      </div>
    </div>

    <div class="field-row">
      <div>
        <label class="field-label">Email</label>
        <input type="email" class="field-input" placeholder="email@exemple.com">
      </div>
      <div>
        <label class="field-label">CIN ou Passeport</label>
        <input type="text" class="field-input" placeholder="AB123456">
      </div>
    </div>

    <div class="info-box">
      Paiement à l'agence ou à la livraison. Réservation confirmée par appel ou WhatsApp dans l'heure.
    </div>

    <div class="summary">
      <div class="sum-row"><span id="sumCar">—</span><span id="sumPpd">—</span></div>
      <div class="sum-row"><span>Durée</span><span id="sumDays">—</span></div>
      <div class="sum-row"><span>Livraison</span><span>Gratuite</span></div>
      <div class="sum-row"><span>Total estimé</span><span id="sumTotal">—</span></div>
    </div>

    <button class="confirm-btn" id="confirmBtn" onclick="doConfirm()">
      Confirmer la réservation
    </button>
  </div>
</div>

    imgs:['https://images.unsplash.com/photo-1502877338535-766e1452684a?w=1200&q=85','https://images.unsplash.com/photo-1609521263047-f8f205293f24?w=1200&q=85','https://images.unsplash.com/photo-1541899481282-d53bffe3c35d?w=1200&q=85','https://images.unsplash.com/photo-1617531653332-bd46c16f7d5d?w=1200&q=85'],
    revs:[{n:'Rim S.',s:5,t:'Petite voiture parfaite pour la ville. Très économique.'},{n:'Hassan M.',s:5,t:'Rapport qualité prix imbattable. Merci Luxaven!'}]
  },
  { name:'Toyota Corolla', year:'2023', cat:'Berline', trans:'Automatique', fuel:'Hybride', seats:5, price:680, rating:4.6, reviews:20, avail:true,
    feats:['Hybride','GPS','Climatisation','Bluetooth','Caméra 360°','Assurance incluse'],
    imgs:['https://images.unsplash.com/photo-1580273916550-e323be2ae537?w=1200&q=85','https://images.unsplash.com/photo-1471444928139-48c5bf5173f8?w=1200&q=85','https://images.unsplash.com/photo-1609521263047-f8f205293f24?w=1200&q=85','https://images.unsplash.com/photo-1502877338535-766e1452684a?w=1200&q=85'],
    revs:[{n:'Laila H.',s:5,t:'Très faible consommation. Parfaite pour Casablanca–Marrakech.'},{n:'Saad N.',s:4,t:'Confortable et fiable. Service Luxaven au top.'}]
  },
  { name:'BMW X1', year:'2023', cat:'SUV Premium', trans:'Automatique', fuel:'Essence', seats:5, price:920, rating:5, reviews:8, avail:false,
    feats:['Cuir Nappa','ConnectedDrive','Toit panoramique','GPS','Sièges chauffants','Clim bi-zone'],
    imgs:['https://images.unsplash.com/photo-1555215695-3004980ad54e?w=1200&q=85','https://images.unsplash.com/photo-1519641471654-76ce0107ad1b?w=1200&q=85','https://images.unsplash.com/photo-1606664515524-ed2f786a0bd6?w=1200&q=85','https://images.unsplash.com/photo-1471444928139-48c5bf5173f8?w=1200&q=85'],
    revs:[{n:'Mehdi A.',s:5,t:'Voiture de rêve! Parfaite pour notre anniversaire de mariage.'}]
  }
];

/* ── INIT ── */
const id = Math.min(Math.max(parseInt(new URLSearchParams(location.search).get('id')) || 0, 0), cars.length - 1);
const c = cars[id];
document.title = 'Luxaven — ' + c.name + ' ' + c.year;

/* Nav title */
document.getElementById('navCarName').textContent = '/ ' + c.name;

/* Badge */
document.getElementById('carBadge').textContent = c.cat + ' · ' + c.year;

/* Name */
document.getElementById('carName').textContent = c.name + ' ' + c.year;

/* Sub */
document.getElementById('carSub').textContent = c.trans + ' · ' + c.fuel + ' · ' + c.seats + ' places';

/* Rating */
const fullStars = Math.floor(c.rating);
const starStr = '★'.repeat(fullStars) + (c.rating % 1 >= 0.5 ? '½' : '');
document.getElementById('carRating').innerHTML =
  `<span class="stars">${starStr}</span><span class="rating-num">${c.rating}</span><span class="rating-count">(${c.reviews} avis)</span>`;

/* Specs */
const specData = [
  { l:'Boîte', v: c.trans },
  { l:'Places', v: c.seats + ' places' },
  { l:'Carburant', v: c.fuel },
  { l:'Bagages', v: '2 valises' },
];
const specEl = document.getElementById('specs');
specData.forEach(s => {
  specEl.innerHTML += `<div class="spec"><div class="spec-label">${s.l}</div><div class="spec-val">${s.v}</div></div>`;
});

/* Features */
const featsEl = document.getElementById('feats');
c.feats.forEach(f => featsEl.innerHTML += `<div class="feat">${f}</div>`);

/* Reviews */
renderReviews();
function renderReviews() {
  const rl = document.getElementById('reviews');
  rl.innerHTML = '';
  c.revs.forEach(r => {
    rl.innerHTML += `
      <div class="review">
        <div class="rev-top">
          <div class="rev-av">${r.n[0].toUpperCase()}</div>
          <div>
            <div class="rev-name">${r.n}</div>
            <div class="rev-stars">${'★'.repeat(r.s)}</div>
          </div>
        </div>
        <div class="rev-text">${r.t}</div>
      </div>`;
  });
}

/* Right panel */
document.getElementById('rPrice').textContent = c.price.toLocaleString('fr-FR') + ' MAD';
const avEl = document.getElementById('rAvail');
avEl.textContent = c.avail ? 'Disponible' : 'Actuellement louée';
avEl.className = 'avail ' + (c.avail ? 'ok' : 'no');
document.getElementById('sumCar').textContent = c.name + ' ' + c.year;
document.getElementById('sumPpd').textContent = c.price + ' MAD/j';
if (!c.avail) document.getElementById('confirmBtn').disabled = true;

/* ── CAROUSEL ── */
let cur = 0;
let timer;
const track = document.getElementById('track');
const dotsEl = document.getElementById('dots');
const thumbsEl = document.getElementById('thumbs');

c.imgs.forEach((src, i) => {
  // Slide
  const slide = document.createElement('div');
  slide.className = 'carousel-slide';
  const img = document.createElement('img');
  img.src = src; img.alt = c.name + ' ' + (i + 1);
  slide.appendChild(img);
  track.appendChild(slide);

  // Dot
  const dot = document.createElement('button');
  dot.className = 'c-dot' + (i === 0 ? ' active' : '');
  dot.onclick = () => goTo(i);
  dotsEl.appendChild(dot);

  // Thumb
  const th = document.createElement('div');
  th.className = 'thumb' + (i === 0 ? ' active' : '');
  th.innerHTML = `<img src="${src}" alt="">`;
  th.onclick = () => goTo(i);
  thumbsEl.appendChild(th);
});

function goTo(n) {
  cur = (n + c.imgs.length) % c.imgs.length;
  track.style.transform = `translateX(-${cur * 100}%)`;
  document.querySelectorAll('.c-dot').forEach((d, i) => d.classList.toggle('active', i === cur));
  document.querySelectorAll('.thumb').forEach((t, i) => t.classList.toggle('active', i === cur));
  resetTimer();
}
function slide(dir) { goTo(cur + dir); }
function resetTimer() {
  clearInterval(timer);
  timer = setInterval(() => slide(1), 4000);
}
resetTimer();

/* ── DATES & TOTAL ── */
function calcTotal() {
  const s = document.getElementById('dateStart').value;
  const e = document.getElementById('dateEnd').value;
  if (!s || !e) return;
  const days = Math.max(1, Math.round((new Date(e) - new Date(s)) / 86400000));
  document.getElementById('sumDays').textContent = days + ' jour' + (days > 1 ? 's' : '');
  document.getElementById('sumTotal').textContent = (days * c.price).toLocaleString('fr-FR') + ' MAD';
}

/* ── ADD REVIEW ── */
function addReview() {
  const n = document.getElementById('revName').value.trim();
  const t = document.getElementById('revText').value.trim();
  if (!n || !t) { alert('Merci de remplir votre prénom et votre avis.'); return; }
  c.revs.unshift({ n, s: 5, t });
  renderReviews();
  document.getElementById('revName').value = '';
  document.getElementById('revText').value = '';
}

/* ── CONFIRM ── */
function doConfirm() {
  const s = document.getElementById('dateStart').value;
  const e = document.getElementById('dateEnd').value;
  if (!s || !e) { alert('Veuillez sélectionner vos dates de location.'); return; }
  const total = document.getElementById('sumTotal').textContent;
  const msg = encodeURIComponent(
    `Bonjour Luxaven!\n\nJe souhaite réserver:\nVéhicule: ${c.name} ${c.year}\nDépart: ${s}\nRetour: ${e}\nTotal estimé: ${total}\n\nMerci de confirmer ma réservation.`
  );
  window.open('https://wa.me/212661472559?text=' + msg, '_blank');
}
</script>
